server:
  port: 8080
spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: account
          uri: lb://account
          predicates:
            - Path=/accounts/**
        - id: loan
          uri: lb://loan
          predicates:
            - Path=/loans/**
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
